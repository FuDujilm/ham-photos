services:
  postgres:
    image: postgres:16-alpine
    container_name: ham-photos-db
    environment:
      POSTGRES_DB: ham_photos
      POSTGRES_USER: ham_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ham_user", "-d", "ham_photos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ham-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ham-photos-backend
    environment:
      DATABASE_URL: postgresql://ham_user:${DB_PASSWORD}@postgres:5432/ham_photos
      RUST_LOG: ${RUST_LOG:-info}
      SITE_CONFIG_PATH: /app/config/site.json
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-50}
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - ham-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: ham-photos-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ham-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  ham-network:
    driver: bridge
